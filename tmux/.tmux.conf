# ─── PREFIX ───
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── SHELL ───
# Detect fish location (macOS vs Linux)
if-shell "test -x /opt/homebrew/bin/fish" "set -g default-shell /opt/homebrew/bin/fish"
if-shell "test -x /usr/bin/fish" "set -g default-shell /usr/bin/fish"

# ─── TERMINAL ───
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on

# ─── WINDOWS & PANES ───
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# ─── NAVIGATION ───
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n S-Left previous-window
bind -n S-Right next-window

# ─── RESIZE ───
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── RELOAD ───
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ─── STATUS BAR (Naadi: stone + emerald) ───
set -g status-position bottom
set -g status-style "bg=#292524,fg=#a8a29e"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=#34d399,bold] #S #[fg=#57534e]│ "
set -g status-right "#[fg=#57534e]│ #[fg=#a8a29e]%H:%M "
setw -g window-status-format "#[fg=#78716c] #I:#W "
setw -g window-status-current-format "#[fg=#e7e5e4,bg=#44403c] #I:#W "
set -g pane-border-style "fg=#44403c"
set -g pane-active-border-style "fg=#34d399"

# ─── COPY MODE ───
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
# Cross-platform clipboard
if-shell "command -v pbcopy" "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'"
if-shell "command -v xclip" "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard'"
if-shell "command -v wl-copy" "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'"
