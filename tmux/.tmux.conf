
# ─── PREFIX ───
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── SHELL ───
# Detect fish location (macOS vs Linux)
if-shell "test -x /opt/homebrew/bin/fish" "set -g default-shell /opt/homebrew/bin/fish"
if-shell "test -x /usr/bin/fish" "set -g default-shell /usr/bin/fish"

# ─── TERMINAL ───
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on

# ─── WINDOWS & PANES ───
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# ─── NAVIGATION ───
# Alt+h/j/k/l — seamless navigation between tmux panes and nvim splits
# Smart check: if active pane is nvim, send key through; otherwise switch pane
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"
bind -n S-Left previous-window
bind -n S-Right next-window

# ─── RESIZE ───
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── RELOAD ───
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ─── STATUS BAR (Catppuccin Mocha) ───
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#a6adc8"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=#a6e3a1,bold] #S #[fg=#45475a]│ "
set -g status-right "#[fg=#45475a]│ #[fg=#a6adc8]%H:%M "
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#cdd6f4,bg=#313244] #I:#W "
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#a6e3a1"

# ─── COPY MODE ───
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
# tmux-yank handles cross-platform clipboard (pbcopy/xclip/wl-copy automatically)

# ─── GIT OPEN ───
bind o run-shell "cd #{pane_current_path} && git-open"

# ─── TPM (Tmux Plugin Manager) ───
# Install: prefix + I   Reload: prefix + r
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_tmux_navigator_no_mappings 1
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Override vim-tmux-navigator's Ctrl bindings (we use Alt instead)
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
